<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端专用视口配置：禁止缩放、适配刘海屏、固定布局 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- 防止iOS Safari长按选中、高亮等干扰行为 -->
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>贪吃蛇 - Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- 游戏标题 -->
        <header class="game-header">
            <h1>🐍 贪吃蛇</h1>
            <div class="score-board">
                <div class="score-item">
                    <span class="score-label">当前分数</span>
                    <span class="score-value" id="currentScore">0</span>
                </div>
                <div class="score-item">
                    <span class="score-label">最高分数</span>
                    <span class="score-value" id="highScore">0</span>
                </div>
            </div>
        </header>

        <!-- 游戏画布 -->
        <div class="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
        </div>

        <!-- 控制说明 -->
        <div class="controls-info">
            <!-- PC端显示键盘说明 -->
            <p class="desktop-only">使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> 控制方向</p>
            <p class="desktop-only"><kbd>空格</kbd> 暂停/继续 | <kbd>R</kbd> 重新开始</p>
            <!-- 移动端显示触摸说明 -->
            <p class="mobile-only">👆 在画布上滑动控制方向</p>
            <p class="mobile-only">点击画布暂停/继续</p>
        </div>

        <!-- 虚拟方向键（仅触摸设备显示） -->
        <div class="virtual-controls" id="virtualControls">
            <div class="d-pad">
                <button class="d-btn d-btn-up" data-direction="up" aria-label="向上">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
                </button>
                <div class="d-middle">
                    <button class="d-btn d-btn-left" data-direction="left" aria-label="向左">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 7.41L10.83 12l4.58 4.59L14 18l-6-6 6-6z"/></svg>
                    </button>
                    <div class="d-center"></div>
                    <button class="d-btn d-btn-right" data-direction="right" aria-label="向右">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
                    </button>
                </div>
                <button class="d-btn d-btn-down" data-direction="down" aria-label="向下">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
                </button>
            </div>
        </div>

        <!-- 游戏状态遮罩层 -->
        <div class="game-overlay" id="gameOverlay">
            <div class="overlay-content">
                <h2 class="overlay-title" id="overlayTitle">准备开始</h2>
                <p class="overlay-message" id="overlayMessage">按空格键或点击按钮开始游戏</p>
                <button class="btn-primary" id="startBtn">开始游戏</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
