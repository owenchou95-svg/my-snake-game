<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 - Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- 游戏标题 -->
        <header class="game-header">
            <h1>🐍 贪吃蛇</h1>
            <div class="score-board">
                <div class="score-item">
                    <span class="score-label">当前分数</span>
                    <span class="score-value" id="currentScore">0</span>
                </div>
                <div class="score-item">
                    <span class="score-label">最高分数</span>
                    <span class="score-value" id="highScore">0</span>
                </div>
            </div>
        </header>

        <!-- 游戏画布 -->
        <div class="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
        </div>

        <!-- 控制说明 -->
        <div class="controls-info">
            <p>使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> 控制方向</p>
            <p><kbd>空格</kbd> 暂停/继续 | <kbd>R</kbd> 重新开始</p>
        </div>

        <!-- 游戏状态遮罩层 -->
        <div class="game-overlay" id="gameOverlay">
            <div class="overlay-content">
                <h2 class="overlay-title" id="overlayTitle">准备开始</h2>
                <p class="overlay-message" id="overlayMessage">按空格键或点击按钮开始游戏</p>
                <button class="btn-primary" id="startBtn">开始游戏</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
